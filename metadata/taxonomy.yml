    - path: docs/philosophy/methodology-toolbox.md
      title: 方法论工具箱
      role: 现象学还原、正反合、可证伪主义、形式化方法等提效工具
  references:
    - path: docs/references/project-architecture-template.md
      title: 项目架构模板
      role: 常见项目结构、架构设计原则、最低门禁和检查清单
    - path: docs/references/python-project-skeleton.md
      title: 通用 Python 项目骨架
      role: Python 应用、服务、脚本工具和库项目的通用骨架
    - path: docs/references/enterprise-architecture-template.md
      title: 企业级 Monorepo / Multi-repo 架构模板
      role: 中大型工程组织、平台工程和多产品线参考模型
    - path: docs/references/modern-enterprise-architecture-template.md
      title: 现代企业数字化平台架构
      role: 面向领域产品网络、微服务容器 GitOps 边界、AI 原生能力、微调治理、AI 事件响应、内部平台、数据产品、供应链安全、FinOps 成本治理、版本治理、可执行标准、RACI 决策权、可靠性分级、仓库拓扑、迁移弃用、审计证据、联邦治理和行业对标矩阵的完整说明文档
    - path: docs/references/modern-enterprise-architecture-version.json
      title: 现代企业数字化平台版本清单
      role: 现代企业数字化平台 V2.14 的机器可读版本、发布状态、pair 清单、控制项数量和同步校验入口
    - path: docs/references/modern-enterprise-architecture-controls.json
      title: 现代企业数字化平台控制项覆盖清单
      role: 现代企业数字化平台 V2.14 的控制项到 schema、example 和 checker 的证据链清单
    - path: docs/references/modern-enterprise-architecture-kit/README.md
      title: 现代企业数字化平台 Starter Kit
      role: 现代企业数字化平台 V2.14 的 45 组 schema、YAML 示例、严格 schema 模式、控制证据映射、审计导出清单、审计导出自动化、控制评估报告、架构基线变更记录、访问复核、密钥轮换、漏洞修复、事故复盘、证据新鲜度、可靠性、数据治理、AI 运行、GitOps 安全、证据链字段和跨文件一致性校验入口
    - path: docs/references/dataset-first-data-service.md
      title: Dataset First 数据服务结构
      role: dataset、contract、registry、runtime 为核心的数据服务模板
    - path: docs/references/code-organization.md
      title: 代码组织
      role: 模块化、命名、注释、格式化、文档和工具
    - path: docs/references/development-experience.md
      title: 开发经验
      role: 变量名、文件结构、编码规范、架构原则和常见基础设施经验
    - path: docs/references/quality-gates-and-pitfalls.md
      title: AI 编程质量门禁与常见坑
      role: 系统提示词、强前置条件、常见坑和硬门禁
    - path: docs/references/low-level-program-logic.md
      title: 底层程序逻辑设计与工程优化项
      role: 运行模型、并发模型、数据模型、性能模型和工程交付检查清单
    - path: docs/references/technology-stack.md
